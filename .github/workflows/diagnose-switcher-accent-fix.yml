name: Diagnose switcher accent fix

on:
  pull_request:
    branches: ["main"]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: fix/switcher-accent-isolation

      - name: Capture patch result
        continue-on-error: true
        run: |
          set +e
          python scripts/apply-switcher-accent-fix.py > switcher-patch.log 2>&1
          status=$?
          printf '%s\n' "$status" > switcher-patch.status
          cat switcher-patch.log
          exit "$status"

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: switcher-patch-diagnostic
          path: |
            switcher-patch.log
            switcher-patch.status

name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  format-feature-branch:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/sidebar-root-library-rework'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply Prettier
        run: |
          npx prettier --write \
            .github/reference/sidebar-root-library-rework.md \
            .github/workflows/ci.yml \
            CHANGELOG.md \
            src/components/RootIndexPanels.tsx \
            src/components/RootIndexSidebar.tsx \
            src/components/scripts/panels.inline.ts \
            src/components/scripts/sidebar.inline.ts \
            src/components/styles/root-library.scss \
            src/components/styles/sidebar-rework.scss \
            src/i18n/locales/en-US.ts \
            src/i18n/locales/fi-FI.ts \
            src/i18n/types.ts \
            src/icons.ts \
            test/library-sort.test.ts \
            test/sidebar-rework.test.ts

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Formatting already clean"
            exit 0
          fi
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add \
            .github/reference/sidebar-root-library-rework.md \
            .github/workflows/ci.yml \
            CHANGELOG.md \
            src/components/RootIndexPanels.tsx \
            src/components/RootIndexSidebar.tsx \
            src/components/scripts/panels.inline.ts \
            src/components/scripts/sidebar.inline.ts \
            src/components/styles/root-library.scss \
            src/components/styles/sidebar-rework.scss \
            src/i18n/locales/en-US.ts \
            src/i18n/locales/fi-FI.ts \
            src/i18n/types.ts \
            src/icons.ts \
            test/library-sort.test.ts \
            test/sidebar-rework.test.ts
          git commit -m "Format sidebar rework"
          git push origin HEAD:agent/sidebar-root-library-rework

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
          else
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

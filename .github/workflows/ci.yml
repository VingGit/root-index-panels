name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Test sidebar rework
        run: npx vitest run test/sidebar-rework.test.ts

      - name: Test library sorting
        run: npx vitest run test/library-sort.test.ts

      - name: Capture regression diagnostics
        run: |
          mkdir -p test-logs
          status=0
          for file in \
            test/appearance.test.tsx \
            test/book-inventory.test.tsx \
            test/panels-script.test.ts \
            test/sidebar-navigation.test.tsx \
            test/sidebar-script.test.ts \
            test/sidebar-style.test.ts \
            test/locales-page-type-manifest.test.tsx
          do
            name="$(basename "$file")"
            if npx vitest run "$file" > "test-logs/$name.txt" 2>&1; then
              echo 0 > "test-logs/$name.status"
            else
              echo 1 > "test-logs/$name.status"
              status=1
            fi
          done
          exit "$status"
        continue-on-error: true

      - name: Upload regression diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-logs
          path: test-logs/

      - name: Fail on regression test errors
        run: |
          if grep -q '^1$' test-logs/*.status; then
            echo "::error::One or more regression tests failed."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
          else
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: CI

on:
  pull_request:

jobs:
  inspect-gitlab-template-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone GitLab template
        run: git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$RUNNER_TEMP/quartz-for-gitlab"

      - name: Collect deployment configuration
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          output="gitlab-template-deployment"
          mkdir -p "$output/files"

          find "$host" -type f \
            \( -name '.gitlab-ci.yml' -o -name 'quartz.config.yaml' -o -name 'quartz.ts' \
               -o -name 'package.json' -o -name '*.sh' -o -name '*.mjs' -o -name '*.js' \
               -o -name '*.ts' -o -name '*.yaml' -o -name '*.yml' \) \
            -not -path '*/node_modules/*' -not -path '*/.git/*' \
            -print0 | while IFS= read -r -d '' file; do
              relative="${file#"$host"/}"
              if grep -Eiq 'CI_PAGES_URL|CI_PROJECT_(PATH|NAME|NAMESPACE)|baseUrl|CNAME|utugit|pages' "$file"; then
                mkdir -p "$output/files/$(dirname "$relative")"
                cp "$file" "$output/files/$relative"
              fi
            done

          grep -RInE 'CI_PAGES_URL|CI_PROJECT_(PATH|NAME|NAMESPACE)|baseUrl|CNAME|utugit|pages' "$host" \
            --exclude-dir=.git --exclude-dir=node_modules > "$output/matches.txt" || true
          git -C "$host" rev-parse HEAD > "$output/revision.txt"
          find "$output" -type f -print | sort

      - name: Upload deployment inspection
        uses: actions/upload-artifact@v7
        with:
          name: gitlab-template-deployment
          path: gitlab-template-deployment

name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
          else
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

      - name: Prepare configured Quartz integration host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          (
            cd "$host"
            npx quartz plugin install --from-config
          )
          echo "RIP_QUARTZ_ROOT=$host" >> "$GITHUB_ENV"
          echo "Configured Quartz host revision: $(git -C "$host" rev-parse HEAD)"

      - name: Run configured Quartz integration
        run: npm run test:integration

      - name: Run watch-mode integration
        run: npm run test:watch-integration

      - name: Verify npm pack dry run
        run: npm pack --dry-run

      - name: Check whitespace errors
        run: git diff --check

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

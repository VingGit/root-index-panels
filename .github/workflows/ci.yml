name: CI

on:
  pull_request:

jobs:
  synchronize-library-item-assertions:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Synchronize complete-library item assertions
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs"

          const path = "test/integration/parent-build.mjs"
          let text = fs.readFileSync(path, "utf8")
          const boundary = `  assert.fail(\`missing complete-library panel link \${href}\`)
          }

          function panelHrefs(html) {`
          const replacement = `  assert.fail(\`missing complete-library panel link \${href}\`)
          }

          function itemForHref(html, href) {
            const library = librarySectionHtml(html)
            for (const match of library.matchAll(/<li\\b[^>]*>[\\s\\S]*?<\\/li>/g)) {
              const openingTag = match[0].slice(0, match[0].indexOf(">") + 1)
              if (
                match[0].includes(\`href="\${href}"\`) &&
                /\\bclass="[^"]*\\brip-(?:card|list-item)\\b/.test(openingTag)
              ) {
                return match[0]
              }
            }
            assert.fail(\`missing complete-library item for \${href}\`)
          }

          function panelHrefs(html) {`

          if (!text.includes("function itemForHref(html, href)")) {
            if (!text.includes(boundary)) throw new Error("library helper insertion boundary not found")
            text = text.replace(boundary, replacement)
          }

          for (const href of ["./java/", "./safe/"]) {
            const escaped = href.replaceAll("/", "\\/")
            text = text.replaceAll(`anchorForHref(rootHtml, "${href}"), /data-rip-`, `itemForHref(rootHtml, "${href}"), /data-rip-`)
            text = text.replaceAll(`anchorForHref(rootHtml, "${href}"), /--rip-panel-`, `itemForHref(rootHtml, "${href}"), /--rip-panel-`)
          }

          fs.writeFileSync(path, text)
          NODE
          npx prettier --write test/integration/parent-build.mjs
          node --check test/integration/parent-build.mjs

      - name: Commit synchronized integration assertions
        run: |
          if git diff --quiet test/integration/parent-build.mjs; then
            echo "Library item assertions already synchronized"
            exit 0
          fi
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add test/integration/parent-build.mjs
          git commit -m "Assert appearance metadata on library items"
          git push origin HEAD:agent/sidebar-root-library-rework

      - name: Build plugin
        run: npm run build

      - name: Prepare configured Quartz integration host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          (
            cd "$host"
            npx quartz plugin install --from-config
          )
          echo "RIP_QUARTZ_ROOT=$host" >> "$GITHUB_ENV"

      - name: Run configured Quartz integration
        run: |
          set +e
          npm run test:integration > configured-integration.log 2>&1
          status=$?
          tail -n 200 configured-integration.log
          exit "$status"

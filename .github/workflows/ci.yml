name: CI

on:
  pull_request:

jobs:
  verify-quartz-plugin-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Prepare complete Quartz integration host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          npm run install-plugins --prefix "$host"
          echo "RIP_QUARTZ_ROOT=$host" >> "$GITHUB_ENV"
          git -C "$host" rev-parse HEAD
          test -f "$host/.quartz/plugins/index.ts"

      - name: Run bootstrapped Quartz integration
        run: |
          set +e
          npm run test:integration > bootstrapped-integration.log 2>&1
          status=$?
          tail -n 200 bootstrapped-integration.log
          exit "$status"

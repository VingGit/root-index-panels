name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Test sidebar rework
        run: npx vitest run test/sidebar-rework.test.ts

      - name: Test library sorting
        if: always()
        run: npx vitest run test/library-sort.test.ts

      - name: Test appearance
        if: always()
        run: npx vitest run test/appearance.test.tsx

      - name: Test book inventory
        if: always()
        run: npx vitest run test/book-inventory.test.tsx

      - name: Test panel scripts
        if: always()
        run: npx vitest run test/panels-script.test.ts

      - name: Test sidebar navigation
        if: always()
        run: npx vitest run test/sidebar-navigation.test.tsx

      - name: Test sidebar scripts
        if: always()
        run: npx vitest run test/sidebar-script.test.ts

      - name: Test sidebar styles
        if: always()
        run: npx vitest run test/sidebar-style.test.ts

      - name: Test locales and manifest
        if: always()
        run: npx vitest run test/locales-page-type-manifest.test.tsx

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
          else
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: CI

on:
  pull_request:

jobs:
  diagnose-quartz-plugin-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Clone Quartz host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          echo "QUARTZ_HOST=$host" >> "$GITHUB_ENV"

      - name: Run Quartz plugin bootstrap diagnostic
        id: bootstrap
        continue-on-error: true
        run: |
          set +e
          npm run install-plugins --prefix "$QUARTZ_HOST" > quartz-plugin-bootstrap.log 2>&1
          status=$?
          printf '%s\n' "$status" > quartz-plugin-bootstrap.status
          tail -n 120 quartz-plugin-bootstrap.log
          find "$QUARTZ_HOST/.quartz" -maxdepth 3 -type f -print > quartz-cache-files.txt 2>&1 || true
          exit "$status"

      - name: Upload Quartz plugin bootstrap diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quartz-plugin-bootstrap-log
          path: |
            quartz-plugin-bootstrap.log
            quartz-plugin-bootstrap.status
            quartz-cache-files.txt

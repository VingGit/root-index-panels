name: CI

on:
  pull_request:

jobs:
  diagnose-complete-gate-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Run plugin verification before integration
        run: |
          npm run typecheck
          npm run lint
          npm run format
          npm run test
          npm run build
          npm run verify:dist
          npm run verify:package

      - name: Prepare Quartz integration host
        run: |
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$RUNNER_TEMP/quartz-for-gitlab"
          npm ci --prefix "$RUNNER_TEMP/quartz-for-gitlab"
          echo "RIP_QUARTZ_ROOT=$RUNNER_TEMP/quartz-for-gitlab" >> "$GITHUB_ENV"
          git -C "$RUNNER_TEMP/quartz-for-gitlab" rev-parse HEAD > quartz-host-revision.txt

      - name: Run complete-gate integration diagnostic
        id: integration
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > complete-gate-integration.log 2>&1
          status=$?
          printf '%s\n' "$status" > complete-gate-integration.status
          tail -n 120 complete-gate-integration.log
          exit "$status"

      - name: Upload complete-gate integration diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: complete-gate-integration-log
          path: |
            complete-gate-integration.log
            complete-gate-integration.status
            quartz-host-revision.txt

name: CI

on:
  pull_request:

jobs:
  diagnose-full-sequence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run preceding verification sequence
        run: |
          npm run typecheck
          npm run lint
          npm run format
          npm run test
          npm run build
          npm run verify:dist
          npm run verify:package

      - name: Run first integration diagnostic
        id: first
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > integration-first.log 2>&1
          status=$?
          printf '%s\n' "$status" > integration-first.status
          cat integration-first.log
          exit "$status"

      - name: Run second integration diagnostic
        id: second
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > integration-second.log 2>&1
          status=$?
          printf '%s\n' "$status" > integration-second.status
          cat integration-second.log
          exit "$status"

      - name: Upload sequence diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quartz-full-sequence-logs
          path: |
            integration-first.log
            integration-first.status
            integration-second.log
            integration-second.status

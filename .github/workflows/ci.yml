name: CI

on:
  pull_request:

jobs:
  diagnose-post-repair-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Prepare Quartz integration host
        run: |
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$RUNNER_TEMP/quartz-for-gitlab"
          npm ci --prefix "$RUNNER_TEMP/quartz-for-gitlab"
          echo "RIP_QUARTZ_ROOT=$RUNNER_TEMP/quartz-for-gitlab" >> "$GITHUB_ENV"
          git -C "$RUNNER_TEMP/quartz-for-gitlab" rev-parse HEAD > quartz-host-revision.txt

      - name: Run post-repair integration diagnostic
        id: integration
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > post-repair-integration.log 2>&1
          status=$?
          printf '%s\n' "$status" > post-repair-integration.status
          tail -n 120 post-repair-integration.log
          exit "$status"

      - name: Upload post-repair integration diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: post-repair-integration-log
          path: |
            post-repair-integration.log
            post-repair-integration.status
            quartz-host-revision.txt

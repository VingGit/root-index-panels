name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  synchronize-rework-integration:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/sidebar-root-library-rework'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Synchronize integration assertions
        run: |
          python scripts/synchronize-rework-integration.py
          npx prettier --write test/integration/parent-build.mjs

      - name: Commit integration assertions
        run: |
          if git diff --quiet; then
            echo "Integration assertions already synchronized"
            exit 0
          fi
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add test/integration/parent-build.mjs
          git commit -m "Synchronize Quartz integration assertions"
          git push origin HEAD:agent/sidebar-root-library-rework

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
          else
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

      - name: Test isolated Quartz integration
        run: npm run test:integration

      - name: Test watch diagnostics
        run: npm run test:watch-integration

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check whitespace errors
        run: git diff --check

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

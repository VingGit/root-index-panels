name: CI

on:
  pull_request:

jobs:
  stress-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Stress isolated Quartz integration
        run: |
          mkdir -p integration-stress
          failures=0
          for attempt in 1 2 3 4 5 6; do
            set +e
            npm run test:integration > "integration-stress/attempt-$attempt.log" 2>&1
            status=$?
            set -e
            printf '%s\n' "$status" > "integration-stress/attempt-$attempt.status"
            echo "attempt $attempt: exit $status"
            if [ "$status" -ne 0 ]; then
              failures=$((failures + 1))
            fi
          done
          echo "failures=$failures" > integration-stress/summary.txt
          cat integration-stress/summary.txt

      - name: Upload integration stress logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-stress-logs
          path: integration-stress/

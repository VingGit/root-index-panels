name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  synchronize-rework-tests:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/sidebar-root-library-rework'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Synchronize established tests
        run: |
          python - <<'PY'
          from pathlib import Path

          def update(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old in text:
                  file.write_text(text.replace(old, new))
              elif new not in text:
                  raise SystemExit(f"Expected pattern not found in {path}: {old[:80]!r}")

          appearance = "test/appearance.test.tsx"
          update(
              appearance,
              '''function appearancePanel(html: string): string {
            const start = html.indexOf('<a href="./alpha/"')
            const end = html.indexOf("</a>", start)
            return start >= 0 && end > start ? html.slice(start, end + 4) : ""
          }''',
              '''function appearancePanel(html: string): string {
            const libraryStart = html.indexOf('id="rip-books"')
            const start = html.indexOf('<a href="./alpha/"', libraryStart)
            const end = html.indexOf("</a>", start)
            return start >= 0 && end > start ? html.slice(start, end + 4) : ""
          }''',
          )
          update(
              appearance,
              '''    expect(countOccurrences(html, 'data-rip-icon="terminal"')).toBe(1)
              expect(countOccurrences(html, 'data-rip-accent="brand"')).toBe(1)
              expect(countOccurrences(html, "--rip-panel-accent: #1a2b3c")).toBe(1)
              expect(countOccurrences(html, "rip-panel-icon")).toBe(1)''',
              '''    expect(countOccurrences(html, 'data-rip-icon="terminal"')).toBe(2)
              expect(countOccurrences(html, 'data-rip-accent="brand"')).toBe(2)
              expect(countOccurrences(html, "--rip-panel-accent: #1a2b3c")).toBe(2)
              expect(countOccurrences(html, "rip-panel-icon")).toBe(2)''',
          )
          text = Path(appearance).read_text()
          text = text.replace('rip-panel-0-title', 'rip-book-0-title')
          text = text.replace('rip-panel-0-count', 'rip-book-0-count')
          Path(appearance).write_text(text)

          inventory = Path("test/book-inventory.test.tsx")
          inventory.write_text(inventory.read_text().replace("No subdirectories found.", "No books found."))

          locales = "test/locales-page-type-manifest.test.tsx"
          update(
              locales,
              '''vi.mock("../src/components/styles/panels.scss", () => ({ default: "" }))
          vi.mock("../src/components/styles/sidebar.scss", () => ({ default: "" }))''',
              '''vi.mock("../src/components/styles/panels.scss", () => ({ default: "" }))
          vi.mock("../src/components/styles/root-library.scss", () => ({ default: "" }))
          vi.mock("../src/components/styles/sidebar.scss", () => ({ default: "" }))
          vi.mock("../src/components/styles/sidebar-rework.scss", () => ({ default: "" }))''',
          )
          text = Path(locales).read_text()
          text = text.replace('"No subdirectories found."', '"No books found."')
          text = text.replace('"Alikansioita ei löytynyt."', '"Kirjoja ei löytynyt."')
          Path(locales).write_text(text)
          update(
              locales,
              '''  it.each([
              ["en-US", "directories", "total notes", "Browse directories"],
              ["fi-FI", "hakemistoa", "muistiinpanoja", "Selaa hakemistoja"],
            ])("localizes the %s root overview", (locale, directories, totalNotes, browse) => {
              const html = renderPanels(
                [
                  physicalFile("git/index", { title: "Git" }),
                  physicalFile("git/topic"),
                  physicalFile("java/index", { title: "Java" }),
                  physicalFile("java/one"),
                  physicalFile("java/two"),
                ],
                undefined,
                locale,
              )

              expect(html).toContain(`<dt>${directories}</dt><dd>2</dd>`)
              expect(html).toContain(`<dt>${totalNotes}</dt><dd>3</dd>`)
              expect(html).toContain(`href="#rip-directories">${browse}`)
              expect(html).toContain(`id="rip-directories-heading">${browse}</h2>`)
            })''',
              '''  it.each([
              ["en-US", "books", "total notes", "Explore books", "All books"],
              ["fi-FI", "kirjaa", "muistiinpanoja yhteensä", "Selaa kirjoja", "Kaikki kirjat"],
            ])("localizes the %s root overview", (locale, books, totalNotes, explore, allBooks) => {
              const html = renderPanels(
                [
                  physicalFile("git/index", { title: "Git" }),
                  physicalFile("git/topic"),
                  physicalFile("java/index", { title: "Java" }),
                  physicalFile("java/one"),
                  physicalFile("java/two"),
                ],
                undefined,
                locale,
              )

              expect(html).toContain(`<dt>${books}</dt><dd>2</dd>`)
              expect(html).toContain(`<dt>${totalNotes}</dt><dd>3</dd>`)
              expect(html).toContain(`href="#rip-books">${explore}`)
              expect(html).toContain(`id="rip-books-heading">${allBooks}</h2>`)
            })''',
          )
          update(
              locales,
              '    expect(html).toContain("<dt>last updated</dt><dd>Jan 3, 2024</dd>")',
              '    expect(html).toContain(\'<dt>last edited</dt><dd><time datetime="2024-01-03">Jan 3, 2024</time></dd>\')',
          )
          update(
              locales,
              '    expect(html).not.toContain("<dt>last updated</dt>")',
              '    expect(html).not.toContain("<dt>last edited</dt>")',
          )
          update(
              locales,
              '''    const overviewIndex = html.indexOf('class="rip-overview"')
              const authoredIndex = html.indexOf('class="rip-root-content')
              const directoriesIndex = html.indexOf('id="rip-directories"')
              expect(html).toMatch(/<article class="[^"]*\\brip\\b[^"]*"><div class="rip-overview">/)
              expect(overviewIndex).toBeGreaterThan(-1)
              expect(overviewIndex).toBeLessThan(authoredIndex)
              expect(authoredIndex).toBeLessThan(directoriesIndex)
              expect(html).toContain('id="root-heading"')
              expect(html).toContain("Authored root prose sentinel.")
              expect(html).toContain('id="rip-directories"')''',
              '''    const overviewIndex = html.indexOf('class="rip-overview"')
              const latestIndex = html.indexOf('class="rip-latest"')
              const authoredIndex = html.indexOf('class="rip-root-content')
              const booksIndex = html.indexOf('id="rip-books"')
              expect(html).toMatch(/<article class="[^"]*\\brip\\b[^"]*"><div class="rip-overview">/)
              expect(overviewIndex).toBeGreaterThan(-1)
              expect(overviewIndex).toBeLessThan(latestIndex)
              expect(latestIndex).toBeLessThan(authoredIndex)
              expect(authoredIndex).toBeLessThan(booksIndex)
              expect(html).toContain('id="root-heading"')
              expect(html).toContain("Authored root prose sentinel.")
              expect(html).toContain('id="rip-books"')''',
          )

          sidebar = "test/sidebar-navigation.test.tsx"
          update(
              sidebar,
              '''vi.mock("../src/components/styles/sidebar.scss", () => ({ default: "sidebar-style" }))
          vi.mock("../src/components/scripts/sidebar.inline.ts", () => ({ default: "sidebar-script" }))''',
              '''vi.mock("../src/components/styles/sidebar.scss", () => ({ default: "sidebar-style" }))
          vi.mock("../src/components/styles/sidebar-rework.scss", () => ({
            default: "sidebar-rework-style",
          }))
          vi.mock("../src/components/scripts/sidebar.inline.ts", () => ({ default: "sidebar-script" }))''',
          )
          text = Path(sidebar).read_text()
          text = text.replace("Switch manual", "Switch book")
          text = text.replace("selected manual", "selected book")
          text = text.replace("Vaihda käsikirjaa", "Vaihda kirjaa")
          Path(sidebar).write_text(text)
          update(
              sidebar,
              '''    expect(scope).toMatch(/<details open>\\s*<summary data-rip-state="ancestor">/)
              expect(scope).toMatch(
                /href="\\.\\.\\/\\.\\.\\/java\\/setup\\/install" aria-current="page" data-rip-state="current"/,
              )
              expect(scope).toMatch(
                /class="rip-sidebar-note-link rip-sidebar-book-overview-link" href="\\.\\.\\/\\.\\.\\/java\\/"[^>]*data-rip-state="ancestor"/,
              )
              expect(scope).toContain("Overview")''',
              '''    expect(scope).toMatch(
                /class="rip-sidebar-folder" data-rip-state="ancestor"[^>]*data-rip-open="true"/,
              )
              expect(scope).toMatch(
                /href="\\.\\.\\/\\.\\.\\/java\\/setup\\/install" aria-current="page" data-rip-state="current"/,
              )
              expect(scope).not.toContain("rip-sidebar-book-overview-link")
              expect(scope).not.toContain(">Overview<")''',
          )
          update(
              sidebar,
              '''    const bookIndex = renderSidebar("java/index", fixture())
              const bookScope = sidebarScope(bookIndex)
              expect(bookScope).toMatch(
                /class="rip-sidebar-note-link rip-sidebar-book-overview-link" href="\\.\\.\\/java\\/" aria-current="page" data-rip-state="current"/,
              )
              expect(switcherMenu(bookIndex)).toMatch(
                /class="rip-sidebar-book-link" href="\\.\\.\\/java\\/" aria-current="page" data-rip-state="current" data-rip-selected="true"/,
              )''',
              '''    const bookIndex = renderSidebar("java/index", fixture())
              const bookScope = sidebarScope(bookIndex)
              expect(bookIndex).toMatch(
                /class="rip-sidebar-home-mark" href="\\.\\.\\/java\\/"[^>]*aria-current="page" data-rip-state="current"/,
              )
              expect(bookScope).not.toContain("rip-sidebar-book-overview-link")
              expect(switcherMenu(bookIndex)).toMatch(
                /class="rip-sidebar-book-link" href="\\.\\.\\/java\\/" aria-current="page" data-rip-state="current" data-rip-selected="true"/,
              )''',
          )
          update(
              sidebar,
              '''    expect(scope).toMatch(
              /<li class="rip-sidebar-folder"><details open><summary data-rip-state="ancestor">[\\s\\S]*?Active<\\/span>/,
            )
            expect(scope).toMatch(
              /<li class="rip-sidebar-folder"><details open><summary>[\\s\\S]*?Inactive<\\/span>/,
            )
            expect(scope).toMatch(/<li class="rip-sidebar-folder"><details><summary>[\\s\\S]*?Deep<\\/span>/)''',
              '''    expect(scope).toMatch(
              /class="rip-sidebar-folder" data-rip-state="ancestor"[^>]*data-rip-open="true"[\\s\\S]*?Active<\\/span>/,
            )
            expect(scope).toMatch(
              /class="rip-sidebar-folder" data-rip-open="true"[\\s\\S]*?Inactive<\\/span>/,
            )
            expect(scope).toMatch(
              /class="rip-sidebar-folder" data-rip-open="false"[\\s\\S]*?Deep<\\/span>[\\s\\S]*?<ul[^>]* hidden>/,
            )''',
          )
          update(
              sidebar,
              '    expect(Sidebar.css).toBe("sidebar-style")',
              '    expect(Sidebar.css).toBe("sidebar-style\\nsidebar-rework-style")',
          )
          PY

          npx prettier --write \
            src/components/scripts/panels.inline.ts \
            src/components/scripts/sidebar.inline.ts \
            src/i18n/locales/en-US.ts \
            src/i18n/locales/fi-FI.ts \
            test/appearance.test.tsx \
            test/book-inventory.test.tsx \
            test/locales-page-type-manifest.test.tsx \
            test/sidebar-navigation.test.tsx

      - name: Commit synchronized tests
        run: |
          if git diff --quiet; then
            echo "Tests already synchronized"
            exit 0
          fi
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add \
            src/components/scripts/panels.inline.ts \
            src/components/scripts/sidebar.inline.ts \
            src/i18n/locales/en-US.ts \
            src/i18n/locales/fi-FI.ts \
            test/appearance.test.tsx \
            test/book-inventory.test.tsx \
            test/locales-page-type-manifest.test.tsx \
            test/sidebar-navigation.test.tsx
          git commit -m "Synchronize sidebar rework tests"
          git push origin HEAD:agent/sidebar-root-library-rework

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
          else
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

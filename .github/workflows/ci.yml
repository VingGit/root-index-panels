name: CI

on:
  pull_request:

jobs:
  repair-and-diagnose-clean-quartz:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Repair clean Quartz plugin-cache handling
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs"

          const path = "test/integration/parent-build.mjs"
          const text = fs.readFileSync(path, "utf8")
          const malformed = String.raw`for (const entry of fs.existsSync(parentPlugins)\n    ? fs.readdirSync(parentPlugins, { withFileTypes: true })\n    : []) {`
          const valid = `for (const entry of fs.existsSync(parentPlugins)
            ? fs.readdirSync(parentPlugins, { withFileTypes: true })
            : []) {`
          const original = "for (const entry of fs.readdirSync(parentPlugins, { withFileTypes: true })) {"

          if (text.includes(malformed)) {
            fs.writeFileSync(path, text.replace(malformed, valid))
          } else if (text.includes(original)) {
            fs.writeFileSync(path, text.replace(original, valid))
          } else if (!text.includes(valid)) {
            throw new Error("clean Quartz plugin-cache boundary not found")
          }
          NODE
          npx prettier --write test/integration/parent-build.mjs
          node --check test/integration/parent-build.mjs

      - name: Commit repaired integration harness
        run: |
          if git diff --quiet test/integration/parent-build.mjs; then
            echo "Integration harness already repaired"
          else
            git config user.name VingGit
            git config user.email 61470249+VingGit@users.noreply.github.com
            git add test/integration/parent-build.mjs
            git commit -m "Support clean Quartz integration checkouts"
            git push origin HEAD:agent/sidebar-root-library-rework
          fi

      - name: Prepare Quartz integration host
        run: |
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$RUNNER_TEMP/quartz-for-gitlab"
          npm ci --prefix "$RUNNER_TEMP/quartz-for-gitlab"
          echo "RIP_QUARTZ_ROOT=$RUNNER_TEMP/quartz-for-gitlab" >> "$GITHUB_ENV"
          git -C "$RUNNER_TEMP/quartz-for-gitlab" rev-parse HEAD > quartz-host-revision.txt

      - name: Run repaired clean Quartz diagnostic
        id: integration
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > repaired-quartz-integration.log 2>&1
          status=$?
          printf '%s\n' "$status" > repaired-quartz-integration.status
          tail -n 120 repaired-quartz-integration.log
          exit "$status"

      - name: Upload repaired Quartz diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repaired-quartz-integration-log
          path: |
            repaired-quartz-integration.log
            repaired-quartz-integration.status
            quartz-host-revision.txt

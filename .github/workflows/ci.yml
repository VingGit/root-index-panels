name: CI

on:
  pull_request:

jobs:
  diagnose-configured-quartz-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Prepare configured Quartz integration host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          (
            cd "$host"
            npx quartz plugin install --from-config
          )
          echo "RIP_QUARTZ_ROOT=$host" >> "$GITHUB_ENV"
          git -C "$host" rev-parse HEAD > quartz-host-revision.txt
          test -f "$host/.quartz/plugins/index.ts"

      - name: Run configured Quartz integration diagnostic
        id: integration
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > configured-quartz-integration.log 2>&1
          status=$?
          printf '%s\n' "$status" > configured-quartz-integration.status
          tail -n 120 configured-quartz-integration.log
          exit "$status"

      - name: Upload configured Quartz integration diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: configured-quartz-integration-log
          path: |
            configured-quartz-integration.log
            configured-quartz-integration.status
            quartz-host-revision.txt

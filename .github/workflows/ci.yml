name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair-localized-integration-assertion:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Localize the expected book-home label
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("test/integration/parent-build.mjs")
          text = path.read_text()

          old_assertion = '''  assert.match(
            topicSidebar,
            /class="rip-sidebar-home-mark" href="\\.\\.\\/java\\/"[^>]*aria-label="Open iOS home"/,
          )'''
          new_assertion = '''  assert.ok(
            topicSidebar.includes(
              `class="rip-sidebar-home-mark" href="../java/" aria-label="${expectedLabels.bookHome}"`,
            ),
            "book home-mark label was not localized",
          )'''

          if text.count(old_assertion) != 1:
              raise SystemExit(f"expected one hard-coded book-home assertion, found {text.count(old_assertion)}")
          text = text.replace(old_assertion, new_assertion)

          english = '{ switchBook: "Switch book", explorer: "Explorer" }'
          english_new = '{ switchBook: "Switch book", explorer: "Explorer", bookHome: "Open iOS home" }'
          if text.count(english) != 2:
              raise SystemExit(f"expected two English label bundles, found {text.count(english)}")
          text = text.replace(english, english_new)

          finnish = '{ switchBook: "Vaihda kirjaa", explorer: "Sisältöselain" }'
          finnish_new = '{\n          switchBook: "Vaihda kirjaa",\n          explorer: "Sisältöselain",\n          bookHome: "Avaa kirjan iOS etusivu",\n        }'
          if text.count(finnish) != 1:
              raise SystemExit(f"expected one Finnish label bundle, found {text.count(finnish)}")
          text = text.replace(finnish, finnish_new)

          path.write_text(text)
          PY

      - name: Commit repair
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add test/integration/parent-build.mjs
          git diff --cached --check
          git commit -m "test: localize book home-mark assertion"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

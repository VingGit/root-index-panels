name: CI

on:
  pull_request:

jobs:
  diagnose-merge-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synthetic merge
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run merged integration diagnostic
        id: integration
        continue-on-error: true
        run: |
          set +e
          npm run test:integration > integration-merge.log 2>&1
          status=$?
          printf '%s\n' "$status" > integration-merge.status
          cat integration-merge.log
          exit "$status"

      - name: Upload merged integration diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quartz-merge-integration-log
          path: |
            integration-merge.log
            integration-merge.status

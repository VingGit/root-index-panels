name: Sync follow-up branch

on:
  push:
    branches: ["agent/sidebar-root-library-rework"]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout follow-up branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework
          fetch-depth: 0

      - name: Merge current main
        run: |
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:agent/sidebar-root-library-rework

      - name: Export synchronized repository
        run: |
          git archive --format=tar.gz --output=root-index-panels.tar.gz HEAD

      - name: Upload repository export
        uses: actions/upload-artifact@v7
        with:
          name: synchronized-root-index-panels
          path: root-index-panels.tar.gz

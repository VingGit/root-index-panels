name: Export follow-up branch trigger

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  export-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: git archive --format=tar.gz --output=root-index-panels.tar.gz HEAD
      - uses: actions/upload-artifact@v7
        with:
          name: synchronized-root-index-panels-trigger
          path: root-index-panels.tar.gz

name: Fix follow-up documentation

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Apply documentation cleanup
        run: python scripts/fix-followup-docs.py

      - name: Install dependencies
        run: npm ci

      - name: Format and verify documentation
        run: |
          npx prettier --write \
            .github/instructions/architecture.instructions.md \
            .github/instructions/verification.instructions.md
          npm run format
          git diff --check

      - name: Remove temporary automation
        run: |
          rm scripts/fix-followup-docs.py
          rm .github/workflows/fix-followup-docs.yml

      - name: Commit documentation cleanup
        run: |
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "docs: align follow-up contracts"
          git push origin HEAD:agent/sidebar-root-library-rework

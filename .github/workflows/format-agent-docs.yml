name: Format agent documentation

on:
  push:
    branches: ["agent/format-agent-documentation"]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/format-agent-documentation
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format repository
        run: npx prettier . --write

      - name: Remove one-time workflow
        run: rm .github/workflows/format-agent-docs.yml

      - name: Commit exact formatting
        run: |
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add --all
          if git diff --cached --quiet; then
            echo "No formatting changes were required."
            exit 0
          fi
          git commit -m "style: apply Prettier to agent documentation"
          git push origin HEAD:agent/format-agent-documentation

name: Diagnose follow-up check

on:
  pull_request:
    branches: ["main"]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: agent/sidebar-root-library-rework

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Apply and format requested changes
        run: |
          python scripts/apply-live-followup.py
          npm ci
          npx prettier --write \
            .github/instructions/architecture.instructions.md \
            .github/instructions/verification.instructions.md \
            CHANGELOG.md README.md package.json \
            src/components/RootIndexPanels.tsx \
            src/components/styles/panels.scss \
            src/components/styles/root-library.scss \
            src/components/styles/sidebar.scss \
            src/components/styles/sidebar-rework.scss \
            src/i18n/types.ts src/i18n/locales/en-US.ts src/i18n/locales/fi-FI.ts \
            src/options.ts src/types.ts \
            test/appearance.test.tsx \
            test/integration/parent-build.mjs \
            test/locales-page-type-manifest.test.tsx \
            test/sidebar-style.test.ts

      - name: Capture complete source gate
        continue-on-error: true
        run: |
          set +e
          npm run check > followup-check.log 2>&1
          status=$?
          printf '%s\n' "$status" > followup-check.status
          tail -n 160 followup-check.log
          exit "$status"

      - name: Upload source-gate diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: followup-check-diagnostic
          path: |
            followup-check.log
            followup-check.status

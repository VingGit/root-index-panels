name: Apply switcher accent fix

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: fix/switcher-accent-isolation
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Apply requested changes
        run: python scripts/apply-switcher-accent-fix.py

      - name: Install dependencies
        run: npm ci

      - name: Format changed files
        run: >-
          npx prettier --write
          src/components/styles/sidebar.scss
          test/sidebar-style.test.ts
          README.md CHANGELOG.md
          .github/instructions/architecture.instructions.md
          .github/instructions/verification.instructions.md

      - name: Run complete source gate
        run: npm run check

      - name: Build distribution
        run: npm run build

      - name: Verify distribution and package
        run: |
          npm run verify:dist
          npm run verify:package

      - name: Prepare configured Quartz integration host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          (
            cd "$host"
            npx quartz plugin install --from-config
          )
          echo "RIP_QUARTZ_ROOT=$host" >> "$GITHUB_ENV"
          echo "Configured Quartz host revision: $(git -C "$host" rev-parse HEAD)"

      - name: Run configured Quartz integration
        run: npm run test:integration

      - name: Run watch-mode integration
        run: npm run test:watch-integration

      - name: Verify package dry run
        run: npm pack --dry-run

      - name: Remove temporary automation
        run: |
          rm scripts/apply-switcher-accent-fix.py
          rm .github/workflows/apply-switcher-accent-fix.yml

      - name: Final repository checks
        run: |
          test -f .github/siderbar-rework.md
          git diff --check
          git status --short

      - name: Commit verified implementation
        run: |
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix: isolate book switcher accents"
          git show --no-patch --format='author=%an <%ae>%ncommitter=%cn <%ce>' HEAD
          git push origin HEAD:fix/switcher-accent-isolation

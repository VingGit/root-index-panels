name: Export follow-up branch

on:
  pull_request:
    branches: ["main"]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Export synchronized repository
        run: git archive --format=tar.gz --output=root-index-panels.tar.gz HEAD

      - name: Upload repository export
        uses: actions/upload-artifact@v7
        with:
          name: synchronized-root-index-panels
          path: root-index-panels.tar.gz

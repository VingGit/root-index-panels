name: Main pull request automation

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]
  repository_dispatch:
    types: [merge-main-pr]

permissions:
  contents: read
  pull-requests: read

jobs:
  close-promptfiles:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.ref == 'promptfiles'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close promptfiles pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

  enable-auto-merge:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.ref != 'promptfiles'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"

  validate-promptfiles-sync:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed merge
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.client_payload.pr_number }}/merge

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: git diff --exit-code -- dist/

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

  enable-validated-sync-merge:
    if: github.event_name == 'repository_dispatch'
    needs: validate-promptfiles-sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"

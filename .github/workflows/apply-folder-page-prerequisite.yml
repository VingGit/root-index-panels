# One-time verified main-branch migration; removes itself after success.
name: Apply FolderPage prerequisite

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.head_ref == 'chore/folder-page-prerequisite-runner')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Apply prerequisite changes
        id: patch
        continue-on-error: true
        run: |
          set +e
          python scripts/apply-folder-page-prerequisite.py > prerequisite-patch.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat prerequisite-patch.log
          exit "$status"

      - name: Upload patch diagnostic
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: folder-page-prerequisite-patch-log
          path: prerequisite-patch.log

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Install dependencies
        run: npm ci

      - name: Format changed files
        run: >-
          npx prettier --write
          package.json
          src/build/validate-manifest.ts
          test/locales-page-type-manifest.test.tsx
          test/integration/parent-build.mjs
          scripts/check-packed-package.mjs
          README.md CHANGELOG.md
          .github/instructions/architecture.instructions.md
          .github/instructions/verification.instructions.md
          .github/reference/sidebar-root-library-rework.md

      - name: Run complete source gate
        run: npm run check

      - name: Build distribution
        run: npm run build

      - name: Verify distribution and package
        run: |
          npm run verify:dist
          npm run verify:package

      - name: Prepare configured Quartz integration host
        run: |
          host="$RUNNER_TEMP/quartz-for-gitlab"
          git clone --depth 1 https://gitlab.utu.fi/obsidian/quartz-for-gitlab.git "$host"
          npm ci --prefix "$host"
          (
            cd "$host"
            npx quartz plugin install --from-config
          )
          echo "RIP_QUARTZ_ROOT=$host" >> "$GITHUB_ENV"
          echo "Configured Quartz host revision: $(git -C "$host" rev-parse HEAD)"

      - name: Run configured Quartz integration
        run: npm run test:integration

      - name: Run watch-mode integration
        run: npm run test:watch-integration

      - name: Verify package dry run
        run: npm pack --dry-run

      - name: Remove temporary automation
        run: |
          rm scripts/apply-folder-page-prerequisite.py
          rm .github/workflows/apply-folder-page-prerequisite.yml
          rm -f prerequisite-patch.log

      - name: Final repository checks
        run: |
          test -f .github/siderbar-rework.md
          git diff --check
          git status --short

      - name: Commit verified implementation
        run: |
          git config user.name VingGit
          git config user.email 61470249+VingGit@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix: require FolderPage for landing routes"
          git show --no-patch --format='author=%an <%ae>%ncommitter=%cn <%ce>' HEAD
          git push origin HEAD:main

name: Validate and merge main sync

on:
  repository_dispatch:
    types: [merge-main-pr]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed merge
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.client_payload.pr_number }}/merge

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: git diff --exit-code -- dist/

      - name: Verify dist externals
        run: npm run verify:dist

      - name: Verify packed package
        run: npm run verify:package

  enable-auto-merge:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"
